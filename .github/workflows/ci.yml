name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

      - run: pnpm run format:check

      - run: pnpm run build

      - run: pnpm test
